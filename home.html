<!DOCTYPE html>
<html lang="en">
<head>
    <title>simple website</title>
    <link rel="stlesheet" href="style.css">
    <style>
        .login-box{
            width: 300px;
            margin: 30px auto;
            padding: 20px;
            border: 2px solid gray;
            text-align: center;

        }
        

    .login-box input{
        width: 90%;
        padding: 8px;
        margin: 8px 0;
    }

    .login-box button{
        padding: 8px 15px;
        background-color: aqua;
        border: none;
        cursor: pointer;

    }

    .login-box button:hover{
        background-color: brown;
    }
    </style>
</head>
<body>
    <div class="header">
        <h1>annamacharya university</h1>
    </div>

    <div class="nav">
        <a href="home.html">back to home</a>
        <a href="about.html">about</a>
        <a href="https://youtube.com" target="_blank">contact</a>
    </div>

    <div class="content">
        <h2>welcome to my website</h2>
        <p>this is a simple layout</p>

        <div class="login-box">
            <h3>student login</h3>

            <form>
                <label>registration number</label><br>
                <input type="text" placeholder="enter registration"><br>

                <label>password</label><br>
                <input type="password" placeholder="enter your password"><br>

                <button type="submit">login</button>
            </form>
        </div>
    </div>

    <div class="footer">
    <p>@2026 my website</p>
    </div>

    
</body>
</html>
